<!-- FORMULARIO DE CONTACTO -->
<div id="formulario">
<div class="articulo">
<h2>📬 Envíanos un Mensaje</h2>

<form class="form-contacto" onsubmit="enviarFormulario(event)">

  <div class="campo">
    <label for="nombre">Nombre completo</label>
    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
  </div>

  <div class="campo">
    <label for="email">Correo electrónico</label>
    <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>
  </div>

  <div class="campo">
    <label for="telefono">Teléfono (opcional)</label>
    <input type="tel" id="telefono" name="telefono" placeholder="656-000-0000">
  </div>

  <div class="campo">
    <label for="asunto">Asunto</label>
    <select id="asunto" name="asunto">
      <option value="">-- Selecciona un tema --</option>
      <option value="productos">Consulta de productos</option>
      <option value="precios">Precios y cotizaciones</option>
      <option value="pedido">Seguimiento de pedido</option>
      <option value="otro">Otro</option>
    </select>
  </div>

  <div class="campo">
    <label for="mensaje">Mensaje</label>
    <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
  </div>

  <button type="submit" class="btn-enviar">Enviar mensaje ✉️</button>

</form>

<div id="confirmacion" style="display:none; color:green; margin-top:15px; font-weight:bold;">
  ✅ ¡Mensaje enviado! Nos pondremos en contacto contigo pronto.
</div>

</div>
</div>

</div>
</div>

<footer id="pie">

</footer>

<script>
function enviarFormulario(e) {
  e.preventDefault();
  document.getElementById('confirmacion').style.display = 'block';
  e.target.reset();
  setTimeout(() => {
    document.getElementById('confirmacion').style.display = 'none';
  }, 5000);
}
</script>
